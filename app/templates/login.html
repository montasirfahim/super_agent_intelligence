<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Agent Intelligence — Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .brand {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .brand .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 16px #10b981;
      margin-bottom: 0.5rem;
    }
    .brand h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .brand p {
      margin: 0.4rem 0 0 0;
      color: #94a3b8;
      font-size: 0.85rem;
    }
    .field {
      margin-bottom: 1rem;
    }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .field select, .field input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #374151;
      color: #f8fafc;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .field select:focus, .field input:focus {
      outline: none;
      border-color: #38bdf8;
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: #0c1d3a;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .submit-btn:hover:not(:disabled) {
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(1px); }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fecaca;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }
    .error.show { display: block; }
    .hint {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px dashed #374151;
      color: #94a3b8;
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.5;
    }
    .hint code {
      background: #1e293b;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      color: #38bdf8;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #0c1d3a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="dot"></div>
      <h1>Super Agent Intelligence</h1>
      <p>Multi-Role Liquidity &amp; Risk Coordination Platform</p>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <label for="role">Role</label>
        <select id="role" required>
          <option value="">— Select your role —</option>
          <option value="agent">Agent (Super Agent Outlet)</option>
          <option value="officer">Territory Officer</option>
          <option value="analyst">Risk Analyst</option>
        </select>
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="e.g. agent.bka.dha.1.01" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Demo password is 123456" required />
      </div>

      <button type="submit" id="submit-btn" class="submit-btn">Sign In</button>
      <div id="error" class="error"></div>
    </form>

    <div class="hint">
      Demo credentials (all passwords: <code>123456</code>)<br>
      Agent: <code>agent.bka.dha.1.01</code> · Officer: <code>officer.bka.dha.1</code> · Analyst: <code>analyst.bka.dha</code>
    </div>
  </div>

<script>
  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('error');
  const submitBtn = document.getElementById('submit-btn');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.remove('show');

    const role = document.getElementById('role').value;
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!role) return showError('Please select a role.');
    if (!username) return showError('Username is required.');
    if (!password) return showError('Password is required.');

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role, username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || `Login failed (HTTP ${res.status})`);
      }
      // Success: redirect to role-specific dashboard
      window.location.href = data.redirect;
    } catch (err) {
      showError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
